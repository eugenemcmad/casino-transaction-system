# Local stack: Postgres, Kafka, migrations, API, and processor.
# Env vars override config.yaml inside images (see config package).
services:
  # Infrastructure: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: casino_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: casino
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - casino_net

  # Tool: DB Migrations
  migrate:
    image: migrate/migrate:v4.18.1
    container_name: casino_migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://postgres:pass@postgres:5432/casino?sslmode=disable
      - up
    networks:
      - casino_net

  # Infrastructure: Kafka (Single Node Cluster)
  kafka:
    image: public.ecr.aws/bitnami/kafka:3.4
    container_name: casino_kafka
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 40s
    networks:
      - casino_net

  # Application: HTTP API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: casino_api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=config.yaml
      - PG_URL=postgres://postgres:pass@postgres:5432/casino?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=transactions
      - APP_NAME=api-service
      - APP_VERSION=1.0.0
      - LOG_LEVEL=debug
    networks:
      - casino_net

  # Application: Message Processor (Consumer)
  processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    container_name: casino_processor
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - CONFIG_PATH=config.yaml
      - PG_URL=postgres://postgres:pass@postgres:5432/casino?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=transactions
      - KAFKA_GROUP_ID=processor-group
      - APP_NAME=processor-service
      - APP_VERSION=1.0.0
      - LOG_LEVEL=debug
    networks:
      - casino_net

networks:
  casino_net:
    driver: bridge
