name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality-and-tests:
    name: Errcheck + Unit + Integration + E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Errcheck (all tags)
        run: go run github.com/kisielk/errcheck@latest -tags integration,e2e ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags integration ./...

      - name: E2E tests
        run: go test -tags e2e ./...
