# Production-like stack: only app containers. DB/Kafka are external.
# Set PROD_PG_URL and PROD_KAFKA_BROKERS in the environment (or an .env file).
# Images must ship config.yaml or you must supply all required env vars (see internal/config).
services:
  api:
    image: casino-api:latest # Pre-built image
    container_name: casino_api_prod
    environment:
      - CONFIG_PATH=config.yaml
      - PG_URL=${PROD_PG_URL}
      - KAFKA_BROKERS=${PROD_KAFKA_BROKERS}
      - KAFKA_TOPIC=transactions
      - APP_NAME=api-service
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - LOG_LEVEL=info
    ports:
      - "80:8080"
    restart: always

  processor:
    image: casino-processor:latest # Pre-built image
    container_name: casino_processor_prod
    environment:
      - CONFIG_PATH=config.yaml
      - PG_URL=${PROD_PG_URL}
      - KAFKA_BROKERS=${PROD_KAFKA_BROKERS}
      - KAFKA_TOPIC=transactions
      - KAFKA_GROUP_ID=processor-group-prod
      - APP_NAME=processor-service
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - LOG_LEVEL=info
    restart: always
